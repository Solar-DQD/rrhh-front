name: Sync fork

on:
  schedule:
    - cron: '0 6 * * 1'  
  workflow_dispatch:  

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync main from upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo sync Solar-DQD/rrhh-front -b main
